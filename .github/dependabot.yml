# Dependabot — FULL coverage, notify-only (no auto-merge; the maintainer reviews
# every PR and merges manually). Grouped + capped so each ecosystem opens one PR.
version: 2
updates:
  # GitHub Actions across all workflows (release / lock / codeql).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]

  # Python deps. Dependabot reads requirements.lock.txt (pinned) and opens PRs
  # bumping it. NOTE: lock.yml also regenerates that file (full clean rebuild) —
  # treat lock.yml as the manual "rebuild from scratch" tool and Dependabot as
  # the incremental notifier. On conflict, prefer a lock.yml regen. The lock is
  # produced in an isolated venv, so no runner-preinstalled noise (pipx) appears.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      python:
        patterns: ["*"]
