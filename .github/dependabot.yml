# Dependabot — low-noise dependency maintenance.
# Monthly + grouped + capped so it surfaces updates without flooding the repo.
version: 2
updates:
  # GitHub Actions used in .github/workflows (release.yml, lock.yml, codeql.yml).
  # Supply-chain hygiene — keeps actions/checkout, setup-python, etc. current
  # and supports SHA-pinning per domain/distribution-security.md.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]

  # NOTE: no "pip" ecosystem on purpose.
  #  - requirements.txt is intentionally unpinned (Dependabot has nothing to bump there).
  #  - requirements.lock.txt is OWNED by the lock.yml workflow (regenerated from a clean
  #    install); letting Dependabot also edit it causes ownership conflicts + drags in
  #    runner-preinstalled packages (e.g. pipx).
  #  - Python CVEs are still covered by Dependabot SECURITY updates (repo setting),
  #    which open a PR only for an actual vulnerability — not routine version bumps.
