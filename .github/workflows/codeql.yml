name: CodeQL

# Static security + quality analysis for the Python source.
# Results appear under the repo's Security -> Code scanning tab.

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "30 5 * * 1"  # weekly, Monday 05:30 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      # Python is interpreted — no build step needed; CodeQL analyzes the source directly.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
