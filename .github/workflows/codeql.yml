name: CodeQL

# Static security + quality analysis for the Python source.
# Results appear under the repo's Security -> Code scanning tab.

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "30 5 * * 1"  # weekly, Monday 05:30 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # security-only — code quality (unused imports, empty except, etc.) is
          # a linter's job (ruff), not the security-scanning tab.
          queries: security-extended

      # Python is interpreted — no build step needed; CodeQL analyzes the source directly.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
