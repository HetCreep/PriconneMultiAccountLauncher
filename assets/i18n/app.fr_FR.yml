  home:
    new_version: Une nouvelle version de Priconne Multi Account Launcher est disponible.

  shortcut:
    filename: Nom du fichier
    filename_tooltip: |
      Donnez à ce raccourci le nom que vous souhaitez.
      L'utilisation de caractères autres qu'alphanumériques peut causer des problèmes.

    product_id: Sélectionner product_id
    product_id_tooltip: |
      product_id est l'ID utilisé par DMM pour identifier les jeux.

    account_create_detail: |-
      Créer un raccourci pour lancer rapidement DMMGamePlayer.
      Sélectionnez le compte créé dans l'onglet « Compte ».

    account_path: Sélectionner le compte
    account_path_tooltip: |-
      Sélectionnez le compte créé dans l'onglet « Compte ».
    always_extract_from_dmm: Toujours extraire depuis DMM
    game_args: Arguments du jeu
    game_args_tooltip: |-
      Spécifiez les arguments à transmettre au jeu.
      Pour les jeux Unity, par exemple '-screen-fullscreen 0 -screen-width 1280 -screen-height 720' lance en fenêtre 1280x720.
    external_tool_path: Chemin de l'outil externe
    external_tool_path_tooltip: Chemin de l'outil externe à utiliser au lancement du jeu.
    registry_path: Chemin du Registre
    registry_path_tooltip: Chemin du registre Windows des données du jeu (verrouillé pour sauvegarde/restauration auto par compte).
    auto_update: Mettre à jour automatiquement le jeu au lancement

    create_shortcut_and_save: Créer un raccourci + Enregistrer
    create_shortcut_and_save_tooltip: |
      Créer un raccourci sur le bureau et enregistrer les paramètres.
      L''élévation admin (si le jeu en a besoin) est gérée automatiquement au lancement.

    save_only: Enregistrer uniquement les paramètres
    save_only_tooltip: |
      Enregistre sans créer de raccourci.
      Pour lancer en ligne de commande :
      `PriconneMultiAccountLauncher.exe [Nom du fichier] --type game`

    add_detail: Créer un raccourci et des paramètres pour le lancement rapide.
    edit_detail: Modifier les paramètres du raccourci de lancement rapide.

    file_select: Sélectionner le fichier

    product_id_not_entered: product_id n'est pas saisi.
    filename_not_entered: Nom du fichier non saisi.
    account_path_not_entered: Compte non sélectionné.
    game_info_error: Échec de la récupération des informations du jeu.
    file_not_selected: Aucun fichier sélectionné.
    save_success: Enregistré avec succès.
    delete: Supprimer

    account_edit_detail: Modifier les paramètres pour lancer rapidement DMMGamePlayer.
    dgp_args: Arguments DMMGamePlayer
    dgp_args_tooltip: |-
      Spécifiez les arguments à transmettre à DMMGamePlayer.
      Exemple : 'dmmgameplayer://play/GCL/priconner/cl/win' lance Princess Connect! Re:Dive dans DMMGamePlayer.
      Laissez vide pour ne lancer que DMMGamePlayer.
    unity_command_line_args: En savoir plus sur les arguments de ligne de commande Unity
    unity_command_line_args_tooltip: |-
      Ouvre un site sur les arguments de ligne de commande Unity.
      Utile si le jeu est créé avec Unity.
    unity_command_line_args_link: https://docs.unity3d.com/Manual/PlayerCommandLineArguments.html

