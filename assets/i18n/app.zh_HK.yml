    import_browser_detail: 啟動瀏覽器從 DMMGamePlayer 匯入帳戶資訊。
    browser_select: 選擇瀏覽器
    auto_refresh: 自動刷新登入工作階段
    browser_select_tooltip: |-
      選擇您偏好的瀏覽器。
      指定的瀏覽器會啟動並開啟登入畫面。
    browser_not_selected: 未選擇瀏覽器。
    import_browser: 匯入
    import_browser_success: 匯入成功。

