  home:
    new_version: Priconne 多帳戶啟動器有可用的新版本。

  shortcut:
    filename: 檔案名稱
    filename_tooltip: |
      請為此捷徑命名。
      使用半形英數字以外的字元可能會造成問題。

    product_id: 選擇 product_id
    product_id_tooltip: |
      product_id 是 DMM 用來識別遊戲的 ID。

    account_create_detail: |-
      建立快速啟動 DMMGamePlayer 的捷徑。
      請選擇在「帳戶」分頁中建立的帳戶。

    account_path: 選擇帳戶
    account_path_tooltip: |-
      請選擇在「帳戶」分頁中建立的帳戶。
    always_extract_from_dmm: 永遠從 DMM 擷取
    game_args: 遊戲參數
    game_args_tooltip: |-
      指定傳遞給遊戲的參數。
      對於 Unity 遊戲,例如 '-screen-fullscreen 0 -screen-width 1280 -screen-height 720' 可以視窗模式 1280x720 啟動。
    external_tool_path: 外部工具路徑
    external_tool_path_tooltip: 啟動遊戲時想使用的外部工具的路徑。
    registry_path: 登錄檔路徑
    registry_path_tooltip: 遊戲資料的 Windows 登錄檔路徑(已鎖定,用於每帳戶自動備份/還原)。
    auto_update: 啟動時自動更新遊戲

    create_shortcut_and_save: 建立捷徑並儲存設定
    create_shortcut_and_save_tooltip: |
      在桌面建立捷徑並儲存設定。
      若遊戲需要管理員權限,啟動時會自動請求。

    save_only: 僅儲存設定
    save_only_tooltip: |
      儲存設定但不建立捷徑。
      要從命令列啟動:
      `PriconneMultiAccountLauncher.exe [檔案名稱] --type game`

    add_detail: 建立快速啟動的捷徑與設定。
    edit_detail: 編輯快速啟動捷徑的設定。

    file_select: 選擇檔案

    product_id_not_entered: 未輸入 product_id。
    filename_not_entered: 未輸入檔案名稱。
    account_path_not_entered: 未選擇帳戶。
    game_info_error: 無法取得遊戲資訊。
    file_not_selected: 未選擇檔案。
    save_success: 儲存成功。
    delete: 刪除

    account_edit_detail: 編輯快速啟動 DMMGamePlayer 的設定。
    dgp_args: DMMGamePlayer 參數
    dgp_args_tooltip: |-
      指定傳遞給 DMMGamePlayer 的參數。
      例如 'dmmgameplayer://play/GCL/priconner/cl/win' 會在 DMMGamePlayer 啟動公主連結 Re:Dive。
      留空則只啟動 DMMGamePlayer。
    unity_command_line_args: 進一步瞭解 Unity 命令列參數
    unity_command_line_args_tooltip: |-
      開啟 Unity 命令列參數的網站。
      遊戲由 Unity 製作時可能有幫助。
    unity_command_line_args_link: https://docs.unity3d.com/Manual/PlayerCommandLineArguments.html

  account:
    import_detail: |-
      將 DMMGamePlayer 的帳戶資訊匯入 PriconneMultiAccountLauncher。
      此操作已過時,建議從瀏覽器匯入。

    filename_tooltip: |-
      請為此帳戶命名。
      使用非英數字字元可能會造成問題。
    import: 匯入
    filename: 檔案名稱
    filename_not_entered: 未輸入檔案名稱。
