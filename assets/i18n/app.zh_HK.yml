# Bootstrap translation. Maintainer review + community PRs welcome.
zh_HK:
  title: Priconne 多帳戶啟動器
  language: 繁體中文 (香港)

  font:
    main: "Microsoft JhengHei UI"

  tab:
    home: 主頁
    shortcut: 捷徑
    account: 帳戶
    setting: 設定
    other: 其他
    help: 說明
    create: 建立捷徑
    edit: 編輯捷徑
    general: "一般"
    appearance: "外觀"
    advanced: "進階"
    launch_create: 快速啟動 GamePlayer
    launch_edit: 編輯快速啟動 GamePlayer
    account_import: 從 DMM 匯入
    account_edit: 編輯帳戶
    import_browser: 從瀏覽器匯入
    device: 註冊裝置
