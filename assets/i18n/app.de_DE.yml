    create_shortcut_and_save_tooltip: |
      Desktop-Verknüpfung erstellen und Einstellungen speichern.
      Admin-Rechte (falls vom Spiel benötigt) werden beim Start automatisch angefordert.

    save_only: Nur Einstellungen speichern
    save_only_tooltip: |
      Speichert ohne Verknüpfung zu erstellen.
      Start über Befehlszeile:
      `PriconneMultiAccountLauncher.exe [Dateiname] --type game`

    add_detail: Verknüpfung und Einstellungen für Schnellstart erstellen.
    edit_detail: Einstellungen der Schnellstart-Verknüpfung bearbeiten.

    file_select: Datei auswählen

    product_id_not_entered: product_id nicht eingegeben.
    filename_not_entered: Dateiname nicht eingegeben.
    account_path_not_entered: Kein Konto ausgewählt.
    game_info_error: Spielinformationen konnten nicht abgerufen werden.
    file_not_selected: Keine Datei ausgewählt.
    save_success: Erfolgreich gespeichert.
    delete: Löschen

    account_edit_detail: Einstellungen für den Schnellstart von DMMGamePlayer bearbeiten.
    dgp_args: DMMGamePlayer-Argumente
    dgp_args_tooltip: |-
      Argumente, die an DMMGamePlayer übergeben werden.
      Beispiel: 'dmmgameplayer://play/GCL/priconner/cl/win' startet Princess Connect! Re:Dive in DMMGamePlayer.
      Leer lassen, um nur DMMGamePlayer zu starten.
    unity_command_line_args: Mehr über Unity-Kommandozeilenargumente erfahren
    unity_command_line_args_tooltip: |-
      Öffnet eine Seite zu Unity-Kommandozeilenargumenten.
      Hilfreich, wenn das Spiel mit Unity erstellt wurde.
    unity_command_line_args_link: https://docs.unity3d.com/Manual/PlayerCommandLineArguments.html

