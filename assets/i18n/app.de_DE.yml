  shortcut:
    filename: Dateiname
    filename_tooltip: |
      Vergeben Sie einen beliebigen Namen für diese Verknüpfung.
      Andere Zeichen als alphanumerische können Probleme verursachen.

    product_id: product_id wählen
    product_id_tooltip: |
      product_id ist die von DMM verwendete Spiel-ID.

    account_create_detail: |-
      Erstellt eine Verknüpfung für den Schnellstart von DMMGamePlayer.
      Wählen Sie das im Tab „Konto" erstellte Konto.

    account_path: Konto wählen
    account_path_tooltip: |-
      Wählen Sie das im Tab „Konto" erstellte Konto.
    always_extract_from_dmm: Immer aus DMM extrahieren
    game_args: Spielargumente
    game_args_tooltip: |-
      Argumente, die an das Spiel übergeben werden.
      Bei Unity-Spielen z. B. '-screen-fullscreen 0 -screen-width 1280 -screen-height 720' startet im Fenster 1280x720.
    external_tool_path: Pfad zum externen Tool
    external_tool_path_tooltip: Pfad zu einem externen Tool, das beim Spielstart verwendet werden soll.
    registry_path: Registry-Pfad
    registry_path_tooltip: Windows-Registry-Pfad der Spieldaten (gesperrt, automatische Sicherung/Wiederherstellung pro Konto).
    auto_update: Spiel beim Start automatisch aktualisieren

