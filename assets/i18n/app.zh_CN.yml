    create_shortcut_and_save_tooltip: |
      在桌面创建快捷方式并保存设置。
      如果游戏需要管理员权限,启动时会自动请求。

    save_only: 仅保存设置
    save_only_tooltip: |
      保存设置但不创建快捷方式。
      要从命令行启动:
      `PriconneMultiAccountLauncher.exe [文件名] --type game`

