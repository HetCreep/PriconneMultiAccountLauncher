    dgp_args_tooltip: |-
      指定传递给 DMMGamePlayer 的参数。
      例如 'dmmgameplayer://play/GCL/priconner/cl/win' 会在 DMMGamePlayer 中启动公主连结 Re:Dive。
      留空则仅启动 DMMGamePlayer。
