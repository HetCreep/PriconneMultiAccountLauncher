    filename_tooltip: |
      请为此快捷方式命名。
      使用半角英数字以外的字符可能会引起问题。

    product_id: 选择 product_id
    product_id_tooltip: |
      product_id 是 DMM 用于识别游戏的 ID。

    account_create_detail: |-
      创建快速启动 DMMGamePlayer 的快捷方式。
      请选择在「账号」标签中创建的账号。

