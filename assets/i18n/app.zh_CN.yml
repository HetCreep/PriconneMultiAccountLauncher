    game_args_tooltip: |-
      指定传递给游戏的参数。
      对于基于 Unity 的游戏,例如 '-screen-fullscreen 0 -screen-width 1280 -screen-height 720' 可以以 1280x720 窗口模式启动。
    external_tool_path: 外部工具路径
    external_tool_path_tooltip: 启动游戏时要使用的外部工具的路径。
    registry_path: 注册表路径
    registry_path_tooltip: 游戏数据的 Windows 注册表路径(已锁定,用于每账号自动备份/恢复)。
