# Bootstrap translation. Maintainer review + community PRs welcome.
ko_KR:
  title: Priconne 멀티 계정 런처
  language: 한국어

  font:
    main: "Malgun Gothic"

  tab:
    home: 홈
    shortcut: 바로 가기
    account: 계정
    setting: 설정
    other: 기타
    help: 도움말
    create: 바로 가기 만들기
    edit: 바로 가기 편집
    general: "일반"
    appearance: "외관"
    advanced: "고급"
    launch_create: GamePlayer 빠른 실행
    launch_edit: 빠른 실행 GamePlayer 편집
    account_import: DMM에서 가져오기
    account_edit: 계정 편집
    import_browser: 브라우저에서 가져오기
    device: 장치 등록
    backup: "백업"
    device_list: 장치 목록

  home:
    new_version: Priconne 멀티 계정 런처의 새 버전이 있습니다.

  shortcut:
    filename: 파일 이름
    filename_tooltip: |
      이 바로 가기에 원하는 이름을 지정하세요.
      반각 영숫자 이외의 문자를 사용하면 문제가 발생할 수 있습니다.

    product_id: product_id 선택
    product_id_tooltip: |
      product_id는 DMM이 게임을 식별하는 데 사용하는 ID입니다.

    account_create_detail: |-
      DMMGamePlayer를 빠르게 실행하는 바로 가기를 만듭니다.
      '계정' 탭에서 만든 계정을 선택하세요.

    account_path: 계정 선택
    account_path_tooltip: |-
      '계정' 탭에서 만든 계정을 선택하세요.
    always_extract_from_dmm: 항상 DMM에서 추출
    game_args: 게임 인수
    game_args_tooltip: |-
      게임에 전달할 인수를 지정합니다.
      Unity 게임의 경우 '-screen-fullscreen 0 -screen-width 1280 -screen-height 720'을 입력하면 1280x720 창 모드로 실행됩니다.
    external_tool_path: 외부 도구 경로
    external_tool_path_tooltip: 게임 실행 시 사용할 외부 도구의 경로를 지정합니다.
    registry_path: 레지스트리 경로
    registry_path_tooltip: 게임 데이터의 Windows 레지스트리 경로 (계정별 자동 백업/복원을 위해 잠김).
    auto_update: 실행 시 게임 자동 업데이트

    create_shortcut_and_save: 바로 가기 만들기 + 설정 저장
    create_shortcut_and_save_tooltip: |
      바탕화면 바로 가기를 생성하고 설정을 저장합니다.
      관리자 권한(게임이 요구하는 경우)은 실행 시 자동으로 처리됩니다.

    save_only: 설정만 저장
    save_only_tooltip: |
      바로 가기 없이 설정만 저장합니다.
      명령줄에서 실행:
      `PriconneMultiAccountLauncher.exe [파일 이름] --type game`

    add_detail: 빠른 실행용 바로 가기와 설정을 만듭니다.
    edit_detail: 빠른 실행 바로 가기 설정을 편집합니다.

    file_select: 파일 선택

    product_id_not_entered: product_id가 입력되지 않았습니다.
    filename_not_entered: 파일 이름이 입력되지 않았습니다.
    account_path_not_entered: 계정이 선택되지 않았습니다.
    game_info_error: 게임 정보를 가져오지 못했습니다.
    file_not_selected: 파일이 선택되지 않았습니다.
    save_success: 저장 성공.
    delete: 삭제

    account_edit_detail: DMMGamePlayer 빠른 실행 설정을 편집합니다.
    dgp_args: DMMGamePlayer 인수
    dgp_args_tooltip: |-
      DMMGamePlayer에 전달할 인수를 지정합니다.
      예: 'dmmgameplayer://play/GCL/priconner/cl/win'을 입력하면 DMMGamePlayer에서 프린세스 커넥트! Re:Dive가 실행됩니다.
      비워두면 DMMGamePlayer만 실행됩니다.
    unity_command_line_args: Unity 명령줄 인수 자세히 알아보기
    unity_command_line_args_tooltip: |-
      Unity 명령줄 인수 관련 사이트를 엽니다.
      게임이 Unity로 제작된 경우 유용할 수 있습니다.
    unity_command_line_args_link: https://docs.unity3d.com/Manual/PlayerCommandLineArguments.html

  account:
    import_detail: |-
      DMMGamePlayer 계정 정보를 PriconneMultiAccountLauncher로 가져옵니다.
      이 작업은 사용 중단되었습니다. 브라우저에서 가져오는 것을 권장합니다.

    filename_tooltip: |-
      이 계정에 원하는 이름을 지정하세요.
      영숫자가 아닌 문자를 사용하면 문제가 발생할 수 있습니다.
    import: 가져오기
    filename: 파일 이름
    filename_not_entered: 파일 이름이 입력되지 않았습니다.
    filename_already_exists: 해당 파일 이름이 이미 존재합니다.
    filename_reserved: 해당 파일 이름은 예약되어 있습니다.
    import_error: 가져오기 실패.
    import_success: 가져오기 성공.

    file_select: 파일 선택

    import_browser_detail: 브라우저를 실행하여 DMMGamePlayer에서 계정 정보를 가져옵니다.
    browser_select: 브라우저 선택
    auto_refresh: 로그인 세션 자동 새로 고침
    browser_select_tooltip: |-
      원하는 브라우저를 선택하세요.
      선택한 브라우저가 실행되고 로그인 화면이 열립니다.
    browser_not_selected: 브라우저가 선택되지 않았습니다.
    import_browser: 가져오기
    import_browser_success: 가져오기 성공.

    edit_detail: |-
      계정 정보를 편집합니다.
      고급 작업입니다.

    save: 저장
    delete: 삭제
    save_success: 저장 성공.

    device_detail: |-
      이메일 주소로 전송된 '장치 인증 코드'를 입력하세요.

    send_auth_code: 인증 코드 보내기
    auth: 인증

    hardware_name: 장치 이름
    auth_code: 장치 인증 코드
    auth_code_tooltip: |-
      이메일로 받은 영숫자 코드를 입력하세요.
    send_auth_code_success: 인증 코드 전송 성공.
    auth_success: 인증 성공.
    device_list_success: 장치 목록 가져오기 성공.
    delete_success: 삭제 성공.

    device_registrations: "등록된 장치: %{count} / %{limit}"

  setting:
    save: 저장
    reset_all_settings: 모든 설정 초기화
    confirm_reset: 모든 설정을 초기화하시겠습니까?
    save_success: 설정 저장 성공.
    dmm_game_player_program_folder: DMMGamePlayer 프로그램 폴더
    dmm_game_player_data_folder: DMMGamePlayer 데이터 폴더
    lang: 언어
    theme: 테마
    appearance: 모양

    font_preset: 글꼴 사전 설정
    font_preset_tooltip: |-
      글꼴 사전 설정 선택.
      auto:   현재 언어에 가장 적합한 글꼴 (권장).
      system: Windows 기본 글꼴.

    proxy_all: 프록시
    proxy_all_tooltip: |-
      게임 프록시를 설정합니다.
      예: http://127.0.0.1:80
          https://127.0.0.1:443
          socks5://127.0.0.1:1080
          socks5://user:pass@127.0.0.1:1080

    dmm_proxy_all: DMM 프록시
    dmm_proxy_all_tooltip: |-
      DMM 프록시를 설정합니다.
      예: http://127.0.0.1:80
          https://127.0.0.1:443
          socks5://127.0.0.1:1080
          socks5://user:pass@127.0.0.1:1080

    window_scaling: 창 크기 조정
    reset_to_auto: "자동으로 재설정"
    debug_window: 디버그 창 표시
    output_logfile: 파일에 로그 기록
    mask_token: 로그에서 토큰 숨기기
    disable_update_check: 업데이트 확인 비활성화 (GitHub 호출 없음)

    device_detail: |-
      장치 인증을 위한 장치 정보를 구성합니다.
      이 값은 정확할 필요가 없습니다.

    mac_address: MAC 주소
    hdd_serial: HDD 일련 번호
    motherboard: 마더보드 ID
    user_os: OS

    other_detail: 텍스트 편집기에서 도구 설정을 편집합니다.
    backup_detail: "다른 PC로 백업. 사용자 암호로 암호화. 동일한 암호로 다른 PC에서 복원하세요."
    backup_section: "백업"
    export_backup: "백업 내보내기..."
    import_backup: "백업 가져오기..."
    passphrase_prompt: "암호 입력 (최소 8자):"
    passphrase_too_short: "암호는 최소 8자 이상이어야 합니다."
    export_success: "백업 내보내기 완료 (%{count}개 계정)."
    import_success: "%{count}개 계정을 가져왔습니다."

    open_save_folder: 설정 폴더 열기

  help:
    coop_in_develop: 개발에 기여
    donations_to_developer: 개발자에게 기부
    bug_report: 버그 신고

  launch:
    export_error: 내보내기 실패.
    import_error: 가져오기 실패.

    admin_error: 관리자 권한이 필요합니다.

  component:
    required: 이 필드는 필수입니다.
    required_symbol: "*"
    reference: 참조

    "yes": "예"
    "no": "아니요"

    download: 다운로드 중...

  toast:
    report: 신고
    copy_to_clipboard: "클립보드에 복사"
    details: 세부 정보

  lib:
    dmm_already_running: DMMGamePlayer가 이미 실행 중이어서 시작할 수 없습니다.

  utils:
    file_exists: 해당 파일이 이미 존재합니다.
